<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mes groupes — Le Tableau</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="dot"></span> LE TABLEAU</div>
  <div style="display:flex; align-items:center; gap:0.8rem;">
    <div id="whoami" style="display:flex; align-items:center; gap:0.5rem; font-size:0.9rem; cursor:pointer;" onclick="window.location.href='/profile.html'"></div>
    <button class="btn btn-ghost btn-small" id="logoutBtn">Déconnexion</button>
  </div>
</div>

<div class="wrap" style="padding-top: 2rem;">
  <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom: 1.4rem; flex-wrap: wrap; gap: 1rem;">
    <h2>Mes groupes</h2>
    <div style="display:flex; gap: 0.6rem;">
      <button class="btn btn-ghost" id="openJoin">Rejoindre un groupe</button>
      <button class="btn btn-primary" id="openCreate">+ Nouveau groupe</button>
    </div>
  </div>

  <div id="errorBox" class="error-box hidden"></div>
  <div id="successBox" class="success-box hidden"></div>

  <div id="groupGrid" class="group-grid"></div>
  <p id="emptyState" class="hidden" style="margin-top:1rem;">Tu n'as encore aucun groupe. Crée-en un, ou rejoins celui d'un pote avec son code d'invitation.</p>
</div>

<!-- Modale création -->
<div id="createModal" class="modal-backdrop hidden">
  <div class="panel wrap-narrow" style="width:100%;">
    <h3 style="margin-bottom:1rem;">Créer un groupe</h3>
    <form id="createForm">
      <div class="field">
        <label for="cName">Nom du groupe</label>
        <input id="cName" placeholder="Terminale 4 — Lycée Voltaire" required>
      </div>
      <div class="field">
        <label for="cDesc">Description (optionnel)</label>
        <textarea id="cDesc" rows="2" placeholder="Pronos de la classe, ambiance garantie."></textarea>
      </div>
      <div style="display:flex; gap:0.6rem; justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" id="cancelCreate">Annuler</button>
        <button type="submit" class="btn btn-primary">Créer</button>
      </div>
    </form>
  </div>
</div>

<!-- Modale rejoindre -->
<div id="joinModal" class="modal-backdrop hidden">
  <div class="panel wrap-narrow" style="width:100%;">
    <h3 style="margin-bottom:1rem;">Rejoindre un groupe</h3>
    <form id="joinForm">
      <div class="field">
        <label for="jCode">Code d'invitation</label>
        <input id="jCode" placeholder="A1B2C3D4" style="text-transform:uppercase;" required>
      </div>
      <p style="font-size:0.85rem;">L'admin du groupe devra valider ta demande avant que tu puisses parier.</p>
      <div style="display:flex; gap:0.6rem; justify-content:flex-end;">
        <button type="button" class="btn btn-ghost" id="cancelJoin">Annuler</button>
        <button type="submit" class="btn btn-primary">Envoyer la demande</button>
      </div>
    </form>
  </div>
</div>

<script type="module">
import { api, getUser, clearSession, requireSession, avatarHTML, escapeHTML } from '/js/api.js';

requireSession();
const me = getUser();
document.getElementById('whoami').innerHTML = `${avatarHTML(me, 30)} <span>${escapeHTML(me.pseudo)}</span>`;
document.getElementById('logoutBtn').addEventListener('click', () => { clearSession(); window.location.href = '/index.html'; });

const errorBox = document.getElementById('errorBox');
const successBox = document.getElementById('successBox');
function showError(msg) { errorBox.textContent = msg; errorBox.classList.remove('hidden'); successBox.classList.add('hidden'); }
function showSuccess(msg) { successBox.textContent = msg; successBox.classList.remove('hidden'); errorBox.classList.add('hidden'); }

async function loadGroups() {
  try {
    const { groups } = await api('/groups');
    const grid = document.getElementById('groupGrid');
    document.getElementById('emptyState').classList.toggle('hidden', groups.length > 0);
    grid.innerHTML = groups.map((g, idx) => `
      <div class="group-card" style="--i:${idx}" onclick="window.location.href='/group.html?id=${g.id}'">
        <div class="pill" style="margin-bottom:0.6rem;">${g.myRole === 'ADMIN' ? 'ADMIN' : 'MEMBRE'}</div>
        <h3>${escapeHTML(g.name)}</h3>
        <p style="font-size:0.85rem; margin: 0.3rem 0 0.8rem;">${g.memberCount} membre${g.memberCount > 1 ? 's' : ''} · ${g.betCount} pari${g.betCount > 1 ? 's' : ''}</p>
        <div class="balance mono">${g.myBalance} pts</div>
      </div>
    `).join('');
  } catch (err) {
    showError(err.message);
  }
}
loadGroups();

// --- modale création ---
const createModal = document.getElementById('createModal');
document.getElementById('openCreate').addEventListener('click', () => createModal.classList.remove('hidden'));
document.getElementById('cancelCreate').addEventListener('click', () => createModal.classList.add('hidden'));
document.getElementById('createForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    await api('/groups', {
      method: 'POST',
      body: { name: document.getElementById('cName').value, description: document.getElementById('cDesc').value },
    });
    createModal.classList.add('hidden');
    document.getElementById('createForm').reset();
    showSuccess('Groupe créé !');
    loadGroups();
  } catch (err) { showError(err.message); }
});

// --- modale rejoindre ---
const joinModal = document.getElementById('joinModal');
document.getElementById('openJoin').addEventListener('click', () => joinModal.classList.remove('hidden'));
document.getElementById('cancelJoin').addEventListener('click', () => joinModal.classList.add('hidden'));
document.getElementById('joinForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  try {
    const data = await api('/groups/join', {
      method: 'POST',
      body: { inviteCode: document.getElementById('jCode').value },
    });
    joinModal.classList.add('hidden');
    document.getElementById('joinForm').reset();
    showSuccess(data.message || `Demande envoyée pour rejoindre ${data.group.name}.`);
  } catch (err) { showError(err.message); }
});
</script>
</body>
</html>
